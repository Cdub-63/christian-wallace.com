<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human — Christian D Wallace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      line-height: 1.6;
    }

    a { color: #1d4ed8; text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #e2e8f0;
      background: #ffffff;
    }

    nav a {
      font-size: 0.875rem;
      color: #475569;
    }

    nav a:hover { color: #0f172a; text-decoration: none; }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    .hero h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }

    .hero .subtitle {
      font-size: 1rem;
      color: #475569;
      margin-bottom: 1.5rem;
    }

    .hero p {
      font-size: 0.975rem;
      color: #334155;
    }

    .divider {
      width: 36px;
      height: 2px;
      background: #1d4ed8;
      margin: 2.5rem 0;
    }

    section { margin-bottom: 3rem; }

    h2 {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 1.25rem;
    }

    .link-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      color: #0f172a;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .link-item:hover {
      border-color: #1d4ed8;
      box-shadow: 0 0 0 3px rgba(29,78,216,0.06);
      text-decoration: none;
    }

    .link-icon {
      font-size: 1.25rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .link-text {
      display: flex;
      flex-direction: column;
    }

    .link-label {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .link-handle {
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>
<body>

<nav><a href="/">← Home</a></nav>

<div class="page">

  <div class="hero">
    <h1>The Human</h1>
    <p class="subtitle">Beyond the terminal</p>
    <p>Outside of work, I'm into fitness, lifestyle, and connecting with people. Find me here.</p>
  </div>

  <div class="divider"></div>

  <section>
    <h2>Find Me</h2>
    <div class="link-list">
      <a href="https://instagram.com/itscdub63" class="link-item" target="_blank" rel="noopener noreferrer">
        <span class="link-icon">📸</span>
        <span class="link-text">
          <span class="link-label">Instagram ↗</span>
          <span class="link-handle">@itscdub63</span>
        </span>
      </a>
    </div>
  </section>

</div>
</body>
</html>
