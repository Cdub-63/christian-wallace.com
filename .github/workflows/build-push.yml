name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'Dockerfile'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/christian-wallace-site:latest
            ghcr.io/${{ github.repository_owner }}/christian-wallace-site:${{ github.sha }}
