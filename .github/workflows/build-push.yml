name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'Dockerfile'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/cdub-63/christian-wallace-site:latest
            ghcr.io/cdub-63/christian-wallace-site:${{ github.sha }}

      - name: Update deployment manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s|image: ghcr.io/cdub-63/christian-wallace-site:.*|image: ghcr.io/cdub-63/christian-wallace-site:${{ github.sha }}|" manifests/site/deployment.yaml
          sed -i "s|kubernetes.io/change-cause:.*|kubernetes.io/change-cause: \"${{ github.sha }}\"|" manifests/site/deployment.yaml
          git add manifests/site/deployment.yaml
          git commit -m "ci: deploy site image ${{ github.sha }}"
          git push
