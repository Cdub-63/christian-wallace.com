apiVersion: apps/v1
kind: Deployment
metadata:
  name: site
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: site
  template:
    metadata:
      labels:
        app: site
    spec:
      containers:
        - name: nginx
          image: ghcr.io/cdub-63/christian-wallace-site:bc104e301b755c60e8e3fb9647ea622554e00f77
          ports:
            - containerPort: 80
