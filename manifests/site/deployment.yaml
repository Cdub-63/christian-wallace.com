apiVersion: apps/v1
kind: Deployment
metadata:
  name: site
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: site
  template:
    metadata:
      labels:
        app: site
    spec:
      containers:
        - name: nginx
          image: ghcr.io/cdub-63/christian-wallace-site:53431833e0185c49e6d0827abfa9451d24f7be79
          ports:
            - containerPort: 80
