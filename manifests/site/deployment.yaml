apiVersion: apps/v1
kind: Deployment
metadata:
  name: site
  namespace: default
  annotations:
    kubernetes.io/change-cause: "50a7ab3f6f3ffea035f24544f2a90cef19a26a7a"
spec:
  selector:
    matchLabels:
      app: site
  template:
    metadata:
      labels:
        app: site
    spec:
      serviceAccountName: site
      automountServiceAccountToken: false
      containers:
        - name: nginx
          image: ghcr.io/cdub-63/christian-wallace-site:50a7ab3f6f3ffea035f24544f2a90cef19a26a7a
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
