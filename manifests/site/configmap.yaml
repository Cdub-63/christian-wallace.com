        <div class="divider"></div>
        <div class="grid">
          <a href="/engineering.html" class="card">
            <span class="card-label">Engineering</span>
            <span class="card-sub">Background &amp; work</span>
          </a>
          <a href="/resume.html" class="card">
            <span class="card-label">Resume</span>
            <span class="card-sub">Full CV</span>
          </a>
          <a href="https://github.com/Cdub-63" class="card" target="_blank" rel="noopener noreferrer">
