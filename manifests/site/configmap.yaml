  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Christian D Wallace</title>
      <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
          background: #f8fafc;
          color: #0f172a;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          padding: 2rem;
        }
        .container { max-width: 560px; width: 100%; text-align: center; }
        h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
        .title { font-size: 1rem; color: #475569; margin-bottom: 0.25rem; }
        .location { font-size: 0.875rem; color: #94a3b8; margin-bottom: 2.5rem; }
        .divider { width: 36px; height: 2px; background: #1d4ed8; margin: 0 auto 2.5rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem; }
        .card {
          display: flex; flex-direction: column; align-items: center;
          padding: 1.5rem 1rem; background: #ffffff;
          border: 1px solid #e2e8f0; border-radius: 8px;
          text-decoration: none; color: #0f172a;
          transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        .card:hover { border-color: #1d4ed8; box-shadow: 0 0 0 3px rgba(29,78,216,0.08); }
        .card-label { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.2rem; }
        .card-sub { font-size: 0.8rem; color: #94a3b8; }
      </style>
    </head>
    <body>
      <div class="container">
        <h1>Christian D Wallace</h1>
        <p class="title">Senior Platform &amp; Site Reliability Engineer</p>
